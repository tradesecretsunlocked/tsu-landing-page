<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TSU LAB — Admin · Provision Client</title>
<link rel="icon" href="assets/favicon.png">
<style>
  :root{--navy:#0d1e6e;--navy-light:#1a2f8a;--gold:#D4AF37;--gold2:#f0cf72;--bg0:#08090e;--bg2:#111525;--bg3:#161b30;--card:#121628;--text:#f0f0f0;--muted:#8896b8;--green:#16c784;--red:#ff5f57;--border:#222840;--border-gold:rgba(212,175,55,.35)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg0);color:var(--text);font-family:'Inter',system-ui,Segoe UI,Arial,sans-serif;font-size:14px;line-height:1.5;min-height:100vh;display:grid;place-items:start center;padding:30px 16px;background-image:linear-gradient(rgba(212,175,55,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(212,175,55,.03) 1px,transparent 1px);background-size:52px 52px}
  button{font-family:inherit;cursor:pointer;border:none;outline:none}
  .wrap{width:100%;max-width:560px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:26px}
  .logo{width:200px;display:block;margin:0 auto 14px;mix-blend-mode:screen}
  h1{font-size:18px;text-align:center;margin-bottom:4px}
  .sub{color:var(--muted);font-size:13px;text-align:center;margin-bottom:20px}
  label{display:block;color:var(--muted);font-size:12px;margin:12px 0 5px}
  input,select{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;color:var(--text);font-size:14px}
  .row{display:flex;gap:12px}.row>div{flex:1}
  .feats{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px}
  .feats label{display:flex;align-items:center;gap:7px;margin:0;color:var(--text);font-size:13px;background:var(--bg2);border:1px solid var(--border);padding:8px 12px;border-radius:9px;cursor:pointer}
  .feats input{width:auto}
  .checkrow{display:flex;gap:18px;margin-top:12px}
  .checkrow label{display:flex;align-items:center;gap:7px;color:var(--text);margin:0}
  .btn{width:100%;background:var(--gold);color:#0a0a0a;font-weight:700;padding:12px;border-radius:10px;font-size:14px;margin-top:18px}
  .btn:disabled{opacity:.5}
  .btn.ghost{background:transparent;color:var(--text);border:1px solid var(--border);font-weight:600}
  .msg{margin-top:14px;font-size:13px;min-height:18px}
  .out{margin-top:16px;background:var(--bg2);border:1px solid var(--border-gold);border-radius:10px;padding:14px;font-size:13px;display:none}
  .out.show{display:block}
  .kv{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(34,40,64,.5)}.kv:last-child{border:none}
  .mono{font-family:ui-monospace,Menlo,monospace}
  .copy{background:var(--navy);color:#fff;border:1px solid var(--border-gold);border-radius:6px;padding:3px 8px;font-size:11px}
  .err{color:var(--red)}.ok{color:var(--green)}
</style>
</head>
<body>
<div class="wrap">
  <!-- LOGIN -->
  <div class="card" id="login">
    <img class="logo" src="assets/tsu-lab-logo.png" alt="TSU LAB">
    <h1>Admin · Provision Client</h1>
    <p class="sub">Sign in with your admin email to onboard a new seller.</p>
    <label>Email</label>
    <input id="email" type="email" placeholder="you@email.com" autocomplete="email">
    <button class="btn" id="sendLink">Send sign-in link</button>
    <div class="msg" id="loginMsg"></div>
  </div>

  <!-- FORM -->
  <div class="card" id="app" style="display:none">
    <img class="logo" src="assets/tsu-lab-logo.png" alt="TSU LAB">
    <h1>Provision a new client</h1>
    <p class="sub">Creates the bridge key, billing/settings/feature rows, invites the seller, and links their login — in one step.</p>

    <label>Client name *</label>
    <input id="clientName" placeholder="e.g. Northland Breaks">
    <label>Seller email *</label>
    <input id="sellerEmail" type="email" placeholder="seller@email.com">

    <div class="row">
      <div><label>Plan / tier</label>
        <select id="tier"><option>pro</option><option>local</option><option>elite</option><option>custom</option><option>legacy</option></select></div>
      <div><label>Monthly $ (optional)</label><input id="monthly" type="number" placeholder="29"></div>
    </div>

    <label>Features to enable</label>
    <div class="feats" id="feats">
      <label><input type="checkbox" value="hosting" checked> Hosting</label>
      <label><input type="checkbox" value="automation" checked> Automation</label>
      <label><input type="checkbox" value="scores"> Scores</label>
      <label><input type="checkbox" value="analytics"> Analytics</label>
      <label><input type="checkbox" value="portal"> Portal</label>
    </div>

    <div class="row" style="margin-top:12px">
      <div><label>Total slots (optional)</label><input id="slots" type="number" placeholder="e.g. 32"></div>
      <div><label>Bridge key (optional — auto if blank)</label><input id="bkey" placeholder="leave blank to generate"></div>
    </div>

    <div class="checkrow">
      <label><input type="checkbox" id="grand"> Grandfathered (free hosting)</label>
      <label><input type="checkbox" id="founding"> Founding member</label>
      <label><input type="checkbox" id="invite" checked> Email invite to seller</label>
    </div>

    <button class="btn" id="provision">Provision client</button>
    <div class="msg" id="msg"></div>
    <div class="out" id="out"></div>
    <button class="btn ghost" id="another" style="display:none">Provision another</button>
    <div style="text-align:center;margin-top:14px"><a href="#" id="signout" style="color:var(--muted);font-size:12px">Sign out</a></div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const sb = createClient('https://znyryhgjghjsobkzyfbx.supabase.co', 'sb_publishable_5uKQd3y05-EkgaMZJhxpSg_14SIZC5e');
const $ = s => document.querySelector(s);

$('#sendLink').onclick = async () => {
  const email = $('#email').value.trim(); if (!email) return;
  $('#loginMsg').textContent = 'Sending…';
  const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: window.location.href } });
  $('#loginMsg').textContent = error ? error.message : 'Check your email for the sign-in link ✉️';
};
$('#signout').onclick = async (e) => { e.preventDefault(); await sb.auth.signOut(); location.reload(); };
sb.auth.onAuthStateChange((_e, s) => { if (s) showApp(); });
(async () => { const { data } = await sb.auth.getSession(); if (data.session) showApp(); })();
function showApp(){ $('#login').style.display='none'; $('#app').style.display='block'; }

$('#provision').onclick = async () => {
  const features = [...document.querySelectorAll('#feats input:checked')].map(i => i.value);
  const body = {
    client_name: $('#clientName').value.trim(),
    email: $('#sellerEmail').value.trim(),
    tier: $('#tier').value,
    monthly_amount: $('#monthly').value ? Number($('#monthly').value) : null,
    total_slots: $('#slots').value ? Number($('#slots').value) : null,
    bridge_key: $('#bkey').value.trim() || undefined,
    grandfathered: $('#grand').checked,
    founding_member: $('#founding').checked,
    send_invite: $('#invite').checked,
    features
  };
  if (!body.client_name || !body.email) { $('#msg').innerHTML = '<span class="err">Client name and seller email are required.</span>'; return; }
  $('#provision').disabled = true; $('#msg').textContent = 'Provisioning…'; $('#out').classList.remove('show');
  const { data, error } = await sb.functions.invoke('provision-client', { body });
  $('#provision').disabled = false;
  if (error || (data && data.error)) {
    const m = (data && data.error) || error.message || 'Request failed';
    $('#msg').innerHTML = '<span class="err">' + m + '</span>';
    return;
  }
  $('#msg').innerHTML = '<span class="ok">✓ Client provisioned' + (data.invited ? ' and invited by email.' : '.') + '</span>';
  $('#out').classList.add('show');
  $('#out').innerHTML =
    '<div class="kv"><span>Bridge key</span><span><span class="mono" id="bk">' + data.bridge_key + '</span> <button class="copy" id="cp">Copy</button></span></div>' +
    '<div class="kv"><span>Tier / status</span><span>' + data.tier + ' · ' + data.status + '</span></div>' +
    '<div class="kv"><span>Features</span><span>' + (data.features.join(', ') || '—') + '</span></div>' +
    '<div class="kv"><span>Login</span><span>' + (data.invited ? 'invite emailed' : 'existing/created') + '</span></div>' +
    '<div style="margin-top:8px;color:var(--muted);font-size:12px">Next: set this bridge key in the overlay + extension config, then deploy the overlay.</div>';
  $('#cp').onclick = () => { navigator.clipboard && navigator.clipboard.writeText(data.bridge_key); $('#cp').textContent = 'Copied'; };
  $('#another').style.display = 'block';
  $('#another').onclick = () => { ['clientName','sellerEmail','monthly','slots','bkey'].forEach(id => $('#'+id).value=''); $('#out').classList.remove('show'); $('#msg').textContent=''; $('#another').style.display='none'; };
};
</script>
</body>
</html>
