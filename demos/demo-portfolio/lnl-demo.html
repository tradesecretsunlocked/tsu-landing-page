<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>[DEMO] Legends and Lyrics — Multi-Sport Break Overlay</title>

  <style>
    :root{
      /* ===== LEGENDS & LYRICS (Green + Gold + Cream) ===== */
      --bg0:#223722;
      --bg1:#0a210a;

      --steel1:#f0f0c0;  /* cream highlight */
      --steel2:#e0d0a0;  /* warm cream */
      --steel3:#1e3b1f;  /* deep green */

      --red:#d0b060;       /* gold accent */
      --redDeep:#8a5a18;   /* deep gold/brown */

      --white:#ffffff;

      --border: rgba(240,240,192,0.35);
      --borderSoft: rgb(251 244 206);

      --team-cols: 5;
      --team-height: 68px;
      --teams-h: 390px;

      --W:1080px;
      --radius:16px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      width:100%;
      max-width: var(--W);
      min-height: 600px;
      margin-inline:auto;
      font-family: Arial, sans-serif;
      color: var(--white);
      background: transparent;
      display:flex;
      flex-direction:column;
      align-items:center;
      user-select:none;
    }

    /* ===== Outer container ===== */
    .overlay-container{
      width:100%;
      max-width: var(--W);
      overflow:hidden;
      border-radius: var(--radius);
      padding: 8px;
      background:
        radial-gradient(900px 420px at 30% 0%, rgba(240,240,192,0.16), transparent 62%),
        radial-gradient(900px 520px at 72% 30%, rgba(208,176,96,0.16), transparent 62%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      border: 4px solid rgb(252 241 186);
      box-shadow: 0 12px 32px rgba(0,0,0,0.70);
      display:flex;
      flex-direction:column;
      gap: 8px;
      position:relative;
    }

    .overlay-container::before{
      content:"";
      position:absolute; inset:-30px;
      background:
        radial-gradient(circle at 22% 20%, rgba(240,240,192,0.14), transparent 56%),
        radial-gradient(circle at 72% 18%, rgba(208,176,96,0.14), transparent 58%),
        radial-gradient(circle at 60% 86%, rgba(240,240,192,0.10), transparent 58%);
      filter: blur(16px);
      opacity: .95;
      pointer-events:none;
    }

    /* ===== Header ===== */
    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-radius: 14px;
      padding: 6px 10px;
      background:
      linear-gradient(90deg, rgb(26 49 24) 15%, rgb(222 195 130) 50%, rgb(26 49 24) 85%);
      border: 2px solid var(--borderSoft);
      position:relative;
      z-index: 2;
    }

    .brand{
      display:flex;
      flex-direction:column;
      gap: 2px;
      min-width: 0;
    }

    .brand-title{
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 3px 12px rgba(0,0,0,0.85);
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
      color: var(--steel1);
    }

    .brand-slogan{
      font-size: 12px;
      font-weight: 800;
      opacity: 0.92;
      letter-spacing: 0.8px;
      margin-top:-4px;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
      color: rgba(240,240,192,0.92);
    }

    .header-right{
      display:flex;
      align-items:center;
      gap: 10px;
      flex: 0 0 auto;
    }

    .break-id-box{
      display:flex;
      align-items:center;
      gap: 10px;
      padding: 6px 10px;
      border-radius: 12px;
      background: rgba(0,0,0,0.55);
      border: 2px solid rgba(240,240,192,0.22);
      box-shadow: inset 0 0 14px rgba(0,0,0,0.45);
    }

    .break-id-label{
      font-size: 18px;
      opacity: 0.86;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 900;
      color: rgba(240,240,192,0.92);
    }

    .break-id-value{
      font-size: 20px;
      font-weight: 900;
      color: var(--steel1);
      text-shadow: 0 2px 0 rgba(0,0,0,0.85);
      min-width: 28px;
      text-align:right;
    }

    /* ===== Main wrapper ===== */
    .main{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap: 10px;
      width:100%;
      min-height:0;
      position: relative;
      z-index: 2;
    }

    /* ===== Split grid + center control bar ===== */
    .teams-section{
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      height: var(--teams-h);
      min-height:0;
      align-items:stretch;
      padding: 2px;
      border-radius: 14px;
      background: linear-gradient(90deg, rgba(240,240,192,0.10), rgba(0,0,0,0.20), rgba(208,176,96,0.10));
      border: 2px solid rgba(255,255,255,0.10);
    }

    .conference{
      display:flex;
      flex-direction:column;
     
      border-radius: 14px;
      padding: 3px;
      background: rgba(0,0,0,0.45);
      min-height:0;
      height:inherit;
      width:440px;
      overflow-y:auto;
      overflow-x:hidden;
      justify-content: flex-start;
    }
    .conference::-webkit-scrollbar{ display:none; }

    .conference-title{
      font-size: 16px;
      font-weight: 900;
      text-align:center;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid rgb(251 241 191);
      padding-bottom: 4px;
      color: var(--steel1);
    }

    .division{ margin-top: 4px; }

    .division-name{
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.92;
      color: rgba(240,240,192,0.90);
    }

    .division-teams{
      display:grid;
      grid-template-columns: repeat(var(--team-cols), 1fr);
      gap: 4px;
    }

    /* ===== Team tile ===== */
    .team{
      position:relative;
      background: rgba(0,0,0,0.78);
      border-radius: 10px;
      height: var(--team-height);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      cursor:pointer;
      border: 2px solid rgb(240, 240, 192, 0.98);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      will-change: transform;
    }

    .team:hover{
      transform: translateY(-2px) scale(1.015);
      box-shadow: 0 10px 22px rgba(0,0,0,0.55);
      border-color: rgba(208,176,96,0.55);
    }

    .team img{
      width:100%;
      height:100%;
      object-fit: cover;
      filter: drop-shadow(0 10px 16px rgba(0,0,0,0.55));
    }

    .team-label{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 10px;
      text-align:center;
      font-weight: 900;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      font-size: 18px;
      line-height: 1.05;
      text-shadow: 0 3px 12px rgba(0,0,0,0.80);
      z-index: 3;
      pointer-events:none;
      color: rgb(255, 255, 255);
    }

    /* ===== NIL two-line label (title + subtitle) ===== */
    .team.nil .team-label{
      flex-direction: column;
      gap: 2px;
      padding: 8px;
    }

    .team.nil img{
      filter: brightness(0.35) contrast(1.05);
    }

    .nil-title{
      width: 100%;
      text-align: center;
      font-weight: 900;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      line-height: 1.02;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nil-sub{
      width: 100%;
      text-align: center;
      font-weight: 800;
      opacity: 0.85;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      font-size: 11px;
      line-height: 1.1;
      max-height: 2.2em;
      overflow: hidden;
    }

    .team::before{
      content:'';
      position:absolute;
      inset:-12px;
      border-radius: 14px;
      background:
        radial-gradient(circle, rgba(240,240,192,0.28) 0%, rgba(208,176,96,0.20) 40%, transparent 72%);
      filter: blur(18px);
      opacity: 0.34;
      z-index: 0;
      pointer-events:none;
      animation: tilePulse 3.2s ease-in-out infinite;
    }

    @keyframes tilePulse{
      0%{ opacity: .16; transform: scale(.98); }
      50%{ opacity: .45; transform: scale(1.02); }
      100%{ opacity: .16; transform: scale(.98); }
    }

    .team.sold::before{ opacity: 0.10; animation:none; }

    .team.sold img{
      opacity: 0.22;
      filter: grayscale(1) brightness(0.35);
    }

    .sold-x{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: 54px;
      font-weight: 900;
      color: rgba(208,176,96,0.95);
      text-shadow:
        0 0 10px rgba(208,176,96,0.60),
        0 0 18px rgba(240,240,192,0.22),
        0 10px 22px rgba(0,0,0,0.85);
      z-index: 4;
      pointer-events:none;
      opacity: 0;
      transform: scale(0.92);
      transition: opacity .14s ease, transform .14s ease;
    }
    .team.sold .sold-x{ opacity: 1; transform: scale(1); }

    /* ===== Center control bar ===== */
    .control-bar{
      display:flex;
      flex-direction:column;
      justify-content: space-between;
      align-items: stretch;
      width: 140px;
      border-radius: 14px;
      padding: 10px 6px;
      background: linear-gradient(180deg, rgba(240,240,192,0.12), rgba(0,0,0,0.55), rgba(208,176,96,0.14));
      border: 2px solid rgba(240,240,192,1);
      box-shadow: inset 0 0 18px rgba(0,0,0,0.35);
      position: relative;
      overflow: visible;
    }

    .control-bar .btn{
      background: linear-gradient(180deg, rgb(212 185 112), rgb(253 245 211));
      color: #162812;
      border: 2px solid rgba(240,240,192,0.20);
      border-radius: 12px;
      padding: 10px 8px;
      font-size: 18px;
      font-weight: 900;
      text-transform: uppercase;
      cursor:pointer;
      width:100%;
      box-shadow: 0 6px 14px rgba(0,0,0,0.35);
      transition: transform .12s ease;
      position: relative;
      z-index: 2;
    }
    .control-bar .btn:active{ transform: translateY(1px); }

    .stat-box{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      background: rgba(0,0,0,0.55);
      border: 2px solid rgba(240,240,192,0.92);
      border-radius: 12px;
      padding: 6px 4px;
      position: relative;
      z-index: 2;
    }
    .stat-box .value{
      font-size: 22px;
      font-weight: 900;
      color: var(--steel1);
      text-shadow: 0 2px 0 rgba(0,0,0,0.85);
    }
    .stat-box .label{
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.85;
      font-weight: 900;
      color: rgba(240,240,192,0.92);
    }

    .sold-stat{ cursor:pointer; }

    .brand-logo{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap: 4px;

      position:relative;
      left:50%;
      top:50%;
      transform: translate(-50%, -50%);
      width: 100%;
      padding: 0;

      pointer-events:none;
      animation: logoBreathe 9s ease-in-out infinite;
      transform-origin:center;
      z-index: 1;
      padding-bottom:62px;
    }

    @keyframes logoBreathe{
      0%{ transform: scale(1); }
      50%{ transform: scale(1.06); }
      100%{ transform: scale(1); }
    }

    .brand-logo img{
      width: 150%;
      height:auto;
      top:-280px;
      left:-95px;
      z-index: 999;
      object-fit: contain;
      position:absolute;
      filter:
        drop-shadow(0 10px 18px rgba(0,0,0,0.65))
        drop-shadow(0 0 12px rgba(240,240,192,0.18))
        drop-shadow(0 0 10px rgba(208,176,96,0.18));
      pointer-events:none;
    }

    /* ===== Ticker ===== */
/* ===== Marquee ===== */
.ticker{
  width:100%;
  overflow:hidden;
  height: 40px;
  border-radius: 12px;
  background: linear-gradient(90deg, rgba(240,240,192,0.16), rgba(0,0,0,0.70), rgba(208,176,96,0.18));
  border: 2px solid rgba(240,240,192,0.16);
  position: relative;
}

.ticker-track{
  display:flex;
  align-items:center;
  width:max-content;
  min-width:100%;
  will-change: transform;
  animation: none !important;
}

.ticker-text{
  flex: 0 0 auto;
  white-space: nowrap;
  display:inline-block;
  padding-right: 60px;
  font-weight: 900;
  letter-spacing: 0.8px;
  font-size: 18px;
  line-height: 40px;
  text-transform: uppercase;
  text-shadow: 0 2px 10px rgba(0,0,0,0.65);
  color: rgba(240,240,192,0.96);
}

@keyframes marqueeScroll{
  0%{ transform: translateX(100%); }
  100%{ transform: translateX(-100%); }
}

.obs-slider-wrap{
  margin-top: 12px;
  display:flex;
  align-items:center;
  gap: 10px;
}

.obs-slider-wrap input[type="range"]{
  flex: 1 1 auto;
}

.obs-slider-pill{
  min-width: 84px;
  text-align:center;
  padding: 8px 10px;
  border-radius: 999px;
  border: 2px solid rgba(240,240,192,0.18);
  background: rgba(0,0,0,0.35);
  color: rgba(240,240,192,0.96);
  font-weight: 900;
  font-size: 12px;
}

    /* ===== Control panel ===== */
.control-panel{
  width:100%;
  border: 2px solid rgba(240,240,192,0.16);
  border-radius: 14px;
  padding: 8px;
  background: rgba(0,0,0,0.08);
  display:flex;
  flex-direction:row;
  gap: 8px;
  justify-content: space-between;
  align-items:center;
  flex-wrap: nowrap;
}
.control-panel.hidden{
  display:none;
}
.breaktype-buttons{
  display:flex;
  flex-wrap: nowrap;
  gap: 6px;
  align-items:center;
  min-width: 0;
  flex: 1 1 auto;
  overflow: hidden;
}

    .breaktype-btn{
      background: rgba(0,0,0,0.55);
      color: rgba(240,240,192,0.95);
      border: 2px solid rgba(240,240,192,0.18);
      border-radius: 12px;
      padding: 8px 10px;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor:pointer;
      font-size: 18px;
    }

    .breaktype-btn.active{
      border-color: rgba(208,176,96,0.60);
      box-shadow: 0 0 0 2px rgba(240,240,192,0.10);
    }

.control-actions{
  display:flex;
  align-items:center;
  gap: 8px;
  flex-wrap: nowrap;
  margin-left: 10px;
  flex: 0 0 auto;
}
.breaktype-btn{
  flex: 0 1 auto;
  min-width: 0;
}

#nilItemsBtn{
  max-width: 132px;
  overflow: hidden;
  text-overflow: ellipsis;
}

    .pill-btn{
      background: linear-gradient(180deg, rgb(212 185 112), rgb(253 245 211));
      color: #162812;
      border: 2px solid rgba(240,240,192,0.18);
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 900;
      cursor:pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 13px;
      white-space: nowrap;
      box-shadow: 0 8px 18px rgba(0,0,0,0.30);
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .pill-btn:hover{
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(0,0,0,0.40);
    }
    .pill-btn:active{ transform: translateY(0); }

    .pill-btn.red{
      background: linear-gradient(180deg, rgb(212 185 112), rgb(253 245 211));
      border: 2px solid rgba(240,240,192,0.18);
      color:#162812;
    }

    /* ===== SOLD header row ===== */
 .sold-header-row{
  display:grid;
  grid-template-columns: 1fr auto 1fr;
  align-items:center;
  gap: 8px;
  padding: 6px 10px;
  margin-top: 2px;
  border-radius: 14px;
  background: linear-gradient(90deg, rgba(240,240,192,0.10), rgba(0,0,0,0.12), rgba(208,176,96,0.10));
  border: 1px solid rgba(240,240,192,0.18);
  z-index: 2;
  position: relative;
  min-height: 36px;
}

.sold-header-controls{
  grid-column: 2;
  display:flex;
  align-items:center;
  justify-content:center;
  white-space: nowrap;
}

.sold-sse{
  grid-column: 3;
  justify-self: end;
}

    .sold-panel-title{
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 2px;
      white-space: nowrap;
      opacity: 0.94;
      color: rgba(240,240,192,0.96);
    }


.sse-status-mini{
  gap: 4px;
  padding: 4px 8px;
  border-width: 1px;
  font-size: 10px;
  letter-spacing: 0.5px;
  background: rgba(0,0,0,0.38);
  min-height: 28px;
}

.sse-status-mini .dot{
  width: 7px;
  height: 7px;
  box-shadow: 0 0 6px rgba(255,255,255,0.12);
}


.sse-status{
  display:inline-flex;
  align-items:center;
  gap: 6px;
  padding: 5px 8px;
  border-radius: 999px;
  border: 1px solid rgba(240,240,192,0.18);
  background: rgba(0,0,0,0.25);
  font-weight: 900;
  font-size: 11px;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  white-space: nowrap;
  color: rgba(240,240,192,0.92);
  line-height: 1;
}

.sse-status .dot{
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #666;
  box-shadow: 0 0 8px rgba(255,255,255,0.15);
}
    .sse-status.connected .dot{
      background: #3cff8a;
      box-shadow: 0 0 10px rgba(60,255,138,0.7);
    }
    .sse-status.error .dot{
      background: #ff2f2f;
      box-shadow: 0 0 10px rgba(255,47,47,0.7);
    }

    /* ===== SOLD panel slot ===== */
    .sold-panel-slot{
      width: 95%;
      height: 160px;
      position: relative;
      overflow: visible;
      margin: 0 auto;
      z-index: 2;
    }

    .sold-panel{
      position: relative;
      inset: 0;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      border-radius: 14px;
      border: 2px solid rgba(240,240,192,0.18);
      background: linear-gradient(90deg, rgba(240,240,192,0.12), rgba(0,0,0,0.55), rgba(208,176,96,0.12));
      opacity: 1;
      pointer-events: auto;
      transition: opacity 0.2s ease;
      box-shadow: inset 0 0 18px rgba(0,0,0,0.35);
    }

    .sold-panel.hidden{
      opacity: 1;
      
      background: #505037fa;
      border-color: #d2b871;
    }

    .sold-item{
      display:flex;
      align-items:center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 999px;
      background: rgba(240,240,192,0.10);
      box-shadow: inset 0 0 0 2px rgba(240,240,192,0.10);
      transition: transform .15s ease, box-shadow .15s ease;
    }

    .sold-item:hover{
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.35);
    }

    .sold-item img{
      max-width: 100%;
      max-height: 36px;
      object-fit: contain;
      filter: drop-shadow(0 10px 16px rgba(0,0,0,0.55));
      background: rgba(0,0,0,0.25);
      border-radius: 8px;
      padding: 2px;
    }

    .buyer-input{
      width: 100%;
      border: none;
      outline: none;
      background: rgba(0,0,0,0.55);
      color: rgba(240,240,192,0.96);
      border-radius: 999px;
      padding: 8px 5px;
      font-size: 16px;
      font-weight: 900;
      border: 1px solid rgba(240,240,192,0.14);
    }

    /* ===== Sport density tweaks ===== 
    .overlay-container.sport-nfl{
      --teams-h: 390px;
      --team-height: 65px;
      --team-cols: 4;
    }

 .overlay-container.sport-nba,
.overlay-container.sport-mlb,
.overlay-container.sport-wnba{
  --team-height: 79px;

}

    .overlay-container.sport-nil{
      --team-height: 65px;

    }

*/

    .overlay-container.sport-nil .conference-title,
    .overlay-container.sport-nil .division-name{
      display:none !important;
    }

 

    /* ===== NIL modal ===== */
    .nil-modal{
      position: fixed;
      inset: 0;
      z-index: 5000;
      display:flex;
      align-items:center;
      justify-content:center;
      background: rgba(0,0,0,0.55);
    }
    .nil-modal.hidden{ display:none; }

    .nil-modal-inner{
      width: min(520px, 92vw);
      border-radius: 14px;
      border: 2px solid rgba(240,240,192,0.22);
      background: linear-gradient(180deg, rgba(0,0,0,0.92), rgba(0,0,0,0.85));
      box-shadow: 0 18px 60px rgba(0,0,0,0.65);
      padding: 14px;
    }

    .nil-modal-inner h2{
      margin: 0 0 10px 0;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--steel1);
    }

    #nilTextInput{
      width: 100%;
      height: 220px;
      resize: none;
      border-radius: 12px;
      padding: 10px;
      background: rgba(255,255,255,0.95);
      color: #000;
      font-weight: 900;
      border: 2px solid rgba(255,255,255,0.25);
      outline: none;
    }

    .nil-modal-actions{

/* ===== Border Wick Sweep (Hit Chasers exact) ===== */
.wick{
  position: relative;
  border-radius: 14px;
}
.wick::after{
  content:"";
  position:absolute;
  inset:-2px;                 /* slightly OUTSIDE so glow stays off content */
  border-radius: inherit;
  pointer-events:none;
  z-index: 20;

  background: linear-gradient(130deg,
    rgba(255,221,122,0) 0%,
    rgba(255,221,122,0) 38%,   /* dead zone before the spark */
    rgba(255,250,210,1) 48%,   /* hot core starts */
    rgba(255,221,122,0.95) 52%,
    rgba(216,178,76,0.85) 58%,
    rgba(255,221,122,0) 68%,   /* spark dies out */
    rgba(255,221,122,0) 100%   /* dead zone after spark */
  );
  background-size: 300% 300%;
  animation: wickRun 5s ease-in-out infinite alternate;

  /* border-only mask */
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  mask-composite: exclude;

  /* IMPORTANT: no blur, no blend-mode */
  filter:
    drop-shadow(0 0 10px rgba(255,221,122,0.95))
    drop-shadow(0 0 22px rgba(216,178,76,0.75));

}

@keyframes wickRun{

    /* =========================

    ========================== */


    
    const BASE = (() => {
      const isGhPages = location.hostname.endsWith('github.io');
      if (isGhPages) {
        const parts = location.pathname.split('/').filter(Boolean);
        const repo = parts.length ? parts[0] : '';

    // Legends & Lyrics logo

    // NIL background (kept identical to Wizards behavior)

    const imgPathMLB = (f) => `${BASE}images/mlb/${f}`;
    const imgPathWNBA = (f) => `${BASE}images/wnba/${f}`;

    /* =========================
       LocalStorage namespace
    ========================== */
const LS = {
  BREAK_NUMBER: 'lnl.breakNumber',
  TICKER: 'lnl.tickerLines',
  TICKER_SPEED: 'lnl.tickerSpeed',
  NIL_ENTRIES: 'lnl.nil.entries',
  SOLD_STATE: 'lnl.soldState',

  BRIDGE: 'tsu.bridgeUrl',
  KEY: 'tsu.bridgeKey',

  TITLE_MAIN: 'lnl.title.main',

  NFL_CHASE_ENABLED: 'lnl.nfl.chase.enabled',
  NFL_CHASE_ITEMS: 'lnl.nfl.chase.items'
};

    /* =========================
       Title persistence
    ========================== */
    const DEFAULT_TITLE_MAIN = 'LEGENDS AND LYRICS';
    const DEFAULT_TITLE_SUB  = 'COLLECTIBLES';

    function loadTitles(){
      const main = localStorage.getItem(LS.TITLE_MAIN) || DEFAULT_TITLE_MAIN;
      const sub  = localStorage.getItem(LS.TITLE_SUB)  || DEFAULT_TITLE_SUB;
      return { main, sub };
    }

    function saveTitles(main, sub){
      localStorage.setItem(LS.TITLE_MAIN, main);
      localStorage.setItem(LS.TITLE_SUB, sub);
    }

    function applyTitles(main, sub){

      const s = (sub || DEFAULT_TITLE_SUB).trim() || DEFAULT_TITLE_SUB;

    /* =========================
       Ticker
    ========================== */
/* =========================
   Ticker
========================= */
const DEFAULT_TICKER_LINES = [
  'LEGENDS AND LYRICS',
  'BUY • SELL • TRADE • SPORTS CARDS'
];

const SCORES_BY_SPORT = {
  nba: '',
  nfl: '',
  mlb: '',
  wnba: ''
};

const SCORES_UPDATED_AT = {
  nba: 0,
  nfl: 0,
  mlb: 0,
  wnba: 0
};

let TICKER_LINES = loadTickerLines();
let tickerCycleTimer = null;
let tickerAnim = null;
let tickerRefreshPending = false;


function loadTickerLines(){
  try{
    const raw = localStorage.getItem(LS.TICKER);
    if (!raw) return DEFAULT_TICKER_LINES.slice();
    const arr = JSON.parse(raw);
    if (Array.isArray(arr) && arr.length) return arr.map(s => String(s));
  }catch(_){}
  return DEFAULT_TICKER_LINES.slice();
}

function saveTickerLines(lines){
  localStorage.setItem(LS.TICKER, JSON.stringify(lines));
}

function loadTickerSpeed(){
  const n = parseInt(localStorage.getItem(LS.TICKER_SPEED) || '90', 10);
  return Number.isFinite(n) ? Math.max(40, Math.min(200, n)) : 90;
}

function saveTickerSpeed(n){
  const safe = Number.isFinite(n) ? Math.max(40, Math.min(200, n)) : 90;
  localStorage.setItem(LS.TICKER_SPEED, String(safe));
}

function isFreshSportScore(sport){
  return (Date.now() - (SCORES_UPDATED_AT[sport] || 0)) < 1000 * 60 * 20;
}

function normalizeScorePayloadToText(data){
  if (!data) return '';

  if (typeof data.text === 'string' && data.text.trim()) {
    return data.text.trim();
  }

  if (Array.isArray(data.lines) && data.lines.length){
    return data.lines.map(s => String(s).trim()).filter(Boolean).join(' • ');
  }

  const league = String(data.league || data.sport || '').toUpperCase();

  if (Array.isArray(data.games) && data.games.length){
    const chunks = data.games.slice(0, 10).map(g => {
      const away = String(g.away || g.a || g.awayTeam || '').toUpperCase();
      const home = String(g.home || g.h || g.homeTeam || '').toUpperCase();
      const as = g.awayScore ?? g.as ?? g.aScore;
      const hs = g.homeScore ?? g.hs ?? g.hScore;
      const st = String(g.status || g.state || g.clock || '').trim();

      const scorePart = (Number.isFinite(+as) && Number.isFinite(+hs))
        ? `${away} ${as}-${hs} ${home}`
        : `${away} VS ${home}`;

      return st ? `${scorePart} (${st})` : scorePart;
    });

    const prefix = league ? `${league}: ` : 'SCORES: ';
    return prefix + chunks.join(' • ');
  }

  return '';
}

function getBaseTickerText(){
  return TICKER_LINES.join('   •   ');
}

function getFreshScoreSegments(){
  const order = ['nfl','nba','mlb','wnba'];
  return order
    .filter(s => String(SCORES_BY_SPORT[s] || '').trim() && isFreshSportScore(s))
    .map(s => SCORES_BY_SPORT[s].trim());
}

function buildTickerSequence(){
  const base = getBaseTickerText();
  const scores = getFreshScoreSegments();

  if (!scores.length) return [base];

  const seq = [];
  scores.forEach(scoreText => {
    seq.push(base);
    seq.push(scoreText);
  });

  return seq;
}



function buildFullTickerText(){
  const seq = buildTickerSequence().filter(Boolean);
  if (!seq.length) return ' LEGENDS AND LYRICS ';
  return seq.join('   ✦   ');
}

function applyTickerMarquee(){
  const a = document.getElementById('tickerTextA');
  const b = document.getElementById('tickerTextB');
  const track = document.getElementById('tickerTrack');
  const ticker = document.querySelector('.ticker');
  if (!a || !b || !track || !ticker) return;

  const pxPerSec = loadTickerSpeed();
  const fullText = buildFullTickerText();

  if (tickerAnim) {
    try { tickerAnim.cancel(); } catch(_){}
    tickerAnim = null;
  }
  if (tickerCycleTimer) {
    clearTimeout(tickerCycleTimer);
    tickerCycleTimer = null;
  }

  a.textContent = fullText;
  b.textContent = fullText;

  track.style.animation = 'none';
  track.style.transform = 'translateX(0)';
  void track.offsetWidth;

  requestAnimationFrame(() => {
    const viewWidth = ticker.getBoundingClientRect().width || 900;
    const gap = Math.max(120, Math.round(viewWidth * 0.10));

    a.style.paddingRight = `${gap}px`;
    b.style.paddingRight = `${gap}px`;

    requestAnimationFrame(() => {
      const travel = a.getBoundingClientRect().width || 1400;
      const durMs = Math.max(12000, Math.round((travel / pxPerSec) * 1000));

      tickerAnim = track.animate(
        [
          { transform: 'translateX(0)' },
          { transform: `translateX(-${travel}px)` }
        ],
        {
          duration: durMs,
          easing: 'linear',
          iterations: 1,
          fill: 'forwards'
        }
      );

      tickerCycleTimer = setTimeout(() => {
        tickerCycleTimer = null;

        if (tickerRefreshPending) {
          tickerRefreshPending = false;
        }

        applyTickerMarquee();
      }, durMs);
    });
  });
}

function requestTickerRefresh(){
  tickerRefreshPending = true;
}

function restartTickerCycle(){
  applyTickerMarquee();
}

function refreshTickerText(){
  applyTickerMarquee();
}

function setTickerLines(lines){
  TICKER_LINES = Array.isArray(lines) && lines.length ? lines : DEFAULT_TICKER_LINES.slice();
  saveTickerLines(TICKER_LINES);
  refreshTickerText();
}

function applyTickerFromRaw(raw){
  const txt = String(raw || '').trim();
  const parts = txt.includes('•') ? txt.split('•').map(s => s.trim()).filter(Boolean) : [txt].filter(Boolean);
  setTickerLines(parts.length ? parts : DEFAULT_TICKER_LINES.slice());
}

    /* =========================
       Break number
    ========================== */
    function loadBreakNumber(){
      const raw = localStorage.getItem(LS.BREAK_NUMBER);
      const n = parseInt(raw || '1', 10);
      return Number.isFinite(n) && n > 0 ? n : 1;
    }

    function saveBreakNumber(n){
      localStorage.setItem(LS.BREAK_NUMBER, String(n));
    }

    function setBreakNumber(n){
      const safe = Number.isFinite(n) && n > 0 ? n : 1;
      document.getElementById('breakIdDisplay').textContent = String(safe);
      saveBreakNumber(safe);
      loadSoldState();
      updateStats();
      renderSoldPanel();
    }

    function computeBreakId(){
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth()+1).padStart(2,'0');
      const dd = String(d.getDate()).padStart(2,'0');
      const dayKey = `${yyyy}-${mm}-${dd}`;
      const sport = currentBreakType || 'na';
      const n = loadBreakNumber();
      return `${dayKey}-${sport}-${n}`;
    }

    function startNewBreakCycle(){
      resetAll();
      const cur = loadBreakNumber();
      setBreakNumber(cur + 1);
    }

    /* =========================
       NIL entries
    ========================== */
    function loadNilEntries(){
      try{
        const raw = localStorage.getItem(LS.NIL_ENTRIES);
        const arr = raw ? JSON.parse(raw) : [];
        if (!Array.isArray(arr)) return [];

        return arr.map((e) => {
          const title = String(e?.title || e?.name || '').trim();
          const sub   = String(e?.sub || e?.subtitle || '').trim();
          const code  = String(e?.code || '').trim();
          const image = String(e?.image || '').trim();
          return { title, sub, code, image };
        }).filter(e => e.title.length);
      }catch{
        return [];
      }
    }

    function saveNilEntries(entries){
      localStorage.setItem(LS.NIL_ENTRIES, JSON.stringify(entries || []));
    }

    function makeCodeFromName(name, idx){
      const cleaned = (name || '').toUpperCase().replace(/[^A-Z0-9]+/g,'').slice(0,8);
      const n = String(idx+1).padStart(3,'0');
      return cleaned ? `${cleaned}${n}` : `NIL${n}`;
    }

    function buildNilBreakTypeFromEntries(entries){
      const safe = (entries || []).filter(e => {
        const title = String(e?.title || e?.name || '').trim();
        return title.length > 0;
      });

      const mid = Math.ceil(safe.length / 2);
      const left = safe.slice(0, mid);
      const right = safe.slice(mid);

      const leftTeams = left.map((e, i) => {
        const title = (e.title || e.name || '').trim();
        const sub   = (e.sub || '').trim();
        return {
          code: e.code || makeCodeFromName(title, i),
          title,
          sub,
          name: title,
          image: e.image || ''
        };
      });

      const rightTeams = right.map((e, i) => {
        const title = (e.title || e.name || '').trim();
        const sub   = (e.sub || '').trim();
        return {
          code: e.code || makeCodeFromName(title, mid + i),
          title,
          sub,
          name: title,
          image: e.image || ''
        };
      });

      return {
        name: 'Custom',
        conferences: ['Left','Right'],
        divisions: {
          Left: { Spots: leftTeams },
          Right: { Spots: rightTeams }
        },
        scoreboard: []
      };
    }

    function setNilEntries(entries){
      const safe = Array.isArray(entries) ? entries : [];
      saveNilEntries(safe);
      breakTypes.nil = buildNilBreakTypeFromEntries(safe);
      if (currentBreakType === 'nil') renderTeams();
      SPORT_LOOKUP.nil = null;
    }

    function openNilModal(){
      const modal = document.getElementById('nilModal');
      const ta = document.getElementById('nilTextInput');
      if (!modal || !ta) return;

      const entries = loadNilEntries();
      ta.value = entries
        .map(e => {
          const title = (e?.title || e?.name || '').trim();
          const sub   = (e?.sub || '').trim();
          return sub ? `${title}\t${sub}` : title;
        })
        .filter(Boolean)
        .join('\n');

      modal.classList.remove('hidden');
    }

    function closeNilModal(){
      document.getElementById('nilModal')?.classList.add('hidden');
    }

    function clearNilEntries(){
      setNilEntries([]);
      document.getElementById('nilTextInput').value = '';
    }

    function applyNilText(){
      const el = document.getElementById('nilTextInput');
      const raw = el ? el.value : '';
      const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);

      const entries = lines.map((line, i) => {
        let parts = line.split('\t');
        if (parts.length < 2) parts = line.split('|');
        if (parts.length < 2) parts = line.split(',');

        const title = String(parts[0] || '').trim();
        const sub   = String(parts.slice(1).join(' ').trim() || '');

        return {
          title,
          sub,
          code: makeCodeFromName(title, i),
          image: ''
        };
      }).filter(e => e.title.length);

      setNilEntries(entries);
      closeNilModal();
    }

    function triggerNilCsv(){
      const inp = document.getElementById('nilCsvInput');
      if (!inp) return;
      inp.value = '';
      inp.onchange = importNilCsv;
      inp.click();
    }

    function importNilCsv(){
      const file = document.getElementById('nilCsvInput')?.files?.[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = e => {
        const lines = String(e.target.result || '').split('\n');
        const entries = lines
          .map(l => l.trim())
          .filter(Boolean)
          .map((l, i) => {
            const cols = l.split(',');
            const title = String(cols[0] || '').trim();
            const sub   = String(cols[1] || '').trim();
            if (!title) return null;
            return { title, sub, code: makeCodeFromName(title, i) };
          })

function applyTilePreset(sportKey){
  const root = document.getElementById('overlayRoot');
  if (!root) return;

  const p = TILE_PRESETS[sportKey] || TILE_PRESETS.nfl;

  root.style.setProperty('--team-cols', String(p.cols));
  root.style.setProperty('--team-height', `${p.height}px`);

const lastCodeByListingKey = new Map();
    /* =========================
       Sold persistence per breakType + break#
    ========================== */
    function soldStateKey(){
      const n = loadBreakNumber();
      return `${LS.SOLD_STATE}:${currentBreakType}:${n}`;
    }

    function saveSoldState(){
      try{
        const payload = { sold: Array.from(soldTeams), list: soldTeamsList };
        localStorage.setItem(soldStateKey(), JSON.stringify(payload));
      }catch(_){}
    }

    function loadSoldState(){
      soldTeams.clear();
      soldTeamsList = [];

      try{
        const raw = localStorage.getItem(soldStateKey());
        if (!raw) return;
        const data = JSON.parse(raw);
        const s = Array.isArray(data?.sold) ? data.sold : [];
        const l = Array.isArray(data?.list) ? data.list : [];
        s.forEach(code => soldTeams.add(code));
        soldTeamsList = l.map(e => ({ code: String(e.code||''), buyer: String(e.buyer||'') })).filter(e => e.code);
      }catch(_){}
    }

function loadNFLChaseEnabled(){
  return localStorage.getItem(LS.NFL_CHASE_ENABLED) === '1';
}

function saveNFLChaseEnabled(v){
  localStorage.setItem(LS.NFL_CHASE_ENABLED, v ? '1' : '0');
}

function loadNFLChaseItems(){
  try{
    const raw = JSON.parse(localStorage.getItem(LS.NFL_CHASE_ITEMS) || '[]');
    const arr = Array.isArray(raw) ? raw : [];
    return [
      String(arr[0] || 'CHASE 1').trim() || 'CHASE 1',
      String(arr[1] || 'CHASE 2').trim() || 'CHASE 2',
      String(arr[2] || 'CHASE 3').trim() || 'CHASE 3'
    ];
  }catch(_){
    return ['CHASE 1','CHASE 2','CHASE 3'];
  }
}

function saveNFLChaseItems(items){
  localStorage.setItem(LS.NFL_CHASE_ITEMS, JSON.stringify((items || []).slice(0,3)));
}

function getNFLChaseTeams(){
  const items = loadNFLChaseItems();
  return [
    { code:'CHASE1', name:items[0], image:'' },
    { code:'CHASE2', name:items[1], image:'' },
    { code:'CHASE3', name:items[2], image:'' }
  ];
}

function nflConfigWithChase(){
  const base = JSON.parse(JSON.stringify(breakTypes.nfl));
  if (!loadNFLChaseEnabled()) return base;

  if (!base.divisions.NFC) base.divisions.NFC = {};
  base.divisions.NFC.Chase = getNFLChaseTeams();

  return base;
}

function getCurrentConfig(){
  if (currentBreakType === 'nfl') return nflConfigWithChase();
  return breakTypes[currentBreakType];
}

function toggleNFLChaseSpots(){
  const next = !loadNFLChaseEnabled();
  saveNFLChaseEnabled(next);

  if (next) {
    openChaseModal();
  }

  renderTeams();
}

function openChaseModal(){
  const items = loadNFLChaseItems();
  document.getElementById('chaseInput1').value = items[0] || '';
  document.getElementById('chaseInput2').value = items[1] || '';
  document.getElementById('chaseInput3').value = items[2] || '';
  document.getElementById('chaseModal')?.classList.remove('hidden');
}

function closeChaseModal(){
  document.getElementById('chaseModal')?.classList.add('hidden');
}

function applyChaseModal(){
  const items = [
    document.getElementById('chaseInput1')?.value || 'CHASE 1',
    document.getElementById('chaseInput2')?.value || 'CHASE 2',
    document.getElementById('chaseInput3')?.value || 'CHASE 3'
  ].map((s, i) => String(s || '').trim() || `CHASE ${i + 1}`);

  saveNFLChaseItems(items);
  closeChaseModal();

  if (currentBreakType === 'nfl' && loadNFLChaseEnabled()){
    renderTeams();
  }
}

    /* =========================
       Grid rendering
    ========================== */
    function renderTeams(){
      updateHeader();

      const left = document.getElementById('conferenceLeft');
      const right = document.getElementById('conferenceRight');
      if (!left || !right) return;

      left.innerHTML = '';
      right.innerHTML = '';

      const cfg = getCurrentConfig();
      if (!cfg) return;

      cfg.conferences.forEach((confName, i) => {
        const container = (i === 0) ? left : right;

        const confTitle = document.createElement('div');
        confTitle.className = 'conference-title';
        confTitle.textContent = confName;
        container.appendChild(confTitle);

        const divisions = cfg.divisions[confName] || {};
        Object.keys(divisions).forEach((divName) => {
          const divisionWrap = document.createElement('div');
          divisionWrap.className = 'division';

          const divTitle = document.createElement('div');
          divTitle.className = 'division-name';
          divTitle.textContent = divName;
          divisionWrap.appendChild(divTitle);

          const teamGrid = document.createElement('div');
          teamGrid.className = 'division-teams';

          divisions[divName].forEach((teamObj) => {
            const teamDiv = makeTeamDiv(teamObj);
            teamGrid.appendChild(teamDiv);
          });

          divisionWrap.appendChild(teamGrid);
          container.appendChild(divisionWrap);
        });
      });

      soldTeams.forEach(code => {
        const el = document.querySelector(`[data-team-code="${cssEscape(code)}"]`);
        if (el) el.classList.add('sold');
      });

      SPORT_LOOKUP[currentBreakType] = null;

      updateStats();
      renderSoldPanel();

      if (currentBreakType === 'nil'){
        requestAnimationFrame(refitAllNilTitles);
      }
    }

    function makeTeamDiv(teamObj){
      const teamDiv = document.createElement('div');
      teamDiv.className = 'team';
      teamDiv.dataset.teamCode = teamObj.code || '';

      const isNil = (currentBreakType === 'nil');
      const bgSrc = isNil ? NIL_TILE_BG : (teamObj.image || '');

      if (bgSrc){
        const img = document.createElement('img');
        img.src = bgSrc;
        img.alt = (teamObj.title || teamObj.name || teamObj.code || '');
        img.onerror = () => { img.style.display = 'none'; };
        teamDiv.appendChild(img);
      }

      const label = document.createElement('div');
      label.className = 'team-label';

      if (currentBreakType === 'nil'){
        teamDiv.classList.add('nil');

        const title = document.createElement('div');
        title.className = 'nil-title';
        title.textContent = (teamObj.title || teamObj.name || teamObj.code || '').trim();

        const sub = document.createElement('div');
        sub.className = 'nil-sub';
        sub.textContent = (teamObj.sub || '').trim();

        label.appendChild(title);
        label.appendChild(sub);

        teamDiv.dataset.nilTitle = title.textContent;
      } else {
        label.textContent = teamObj.code || teamObj.name || '';
      }

      teamDiv.appendChild(label);

      const soldX = document.createElement('div');
      soldX.className = 'sold-x';
      soldX.textContent = '✕';
      teamDiv.appendChild(soldX);

      teamDiv.onclick = () => toggleTeam(teamObj.code);
      if (currentBreakType === 'nfl' && /^CHASE[123]$/.test(teamObj.code || '')){
  teamDiv.oncontextmenu = (e) => {
    e.preventDefault();
    openChaseModal();
  };
}
      return teamDiv;
    }

    function toggleTeam(code){
      const sel = `[data-team-code="${cssEscape(code)}"]`;
      const teamDiv = document.querySelector(sel);
      if (!teamDiv) return;

      const existingIndex = soldTeamsList.findIndex(entry => entry.code === code);

      if (soldTeams.has(code)){
        soldTeams.delete(code);
        teamDiv.classList.remove('sold');
        if (existingIndex !== -1) soldTeamsList.splice(existingIndex, 1);
      } else {
        soldTeams.add(code);
        teamDiv.classList.add('sold');
        if (existingIndex === -1) soldTeamsList.push({ code: code, buyer: '' });
      }

      updateStats();
      renderSoldPanel();
      saveSoldState();
    }

    function updateStats(){
      const cfg = getCurrentConfig();
      let total = 0;

      cfg.conferences.forEach(conf => {
        Object.values(cfg.divisions[conf] || {}).forEach(div => total += div.length);
      });

      const sold = soldTeams.size;
      document.getElementById('teamsLeft').textContent = String(Math.max(0, total - sold));
      document.getElementById('teamsSold').textContent = String(sold);
    }

    function renderSoldPanel(){
      const panel = document.getElementById('soldPanel');
      if (!panel) return;

      panel.innerHTML = '';

      soldTeamsList.forEach(entry => {
        const teamObj = findTeamByCode(entry.code);

        const row = document.createElement('div');
        row.className = 'sold-item';

        const img = document.createElement('img');
        img.alt = entry.code;
        img.src = teamObj?.image || '';
        img.onerror = () => { img.style.display = 'none'; };
        row.appendChild(img);

        const input = document.createElement('input');
        input.className = 'buyer-input';
        input.placeholder = entry.code;
        input.value = entry.buyer || '';
        input.oninput = (e) => {
          entry.buyer = e.target.value;
          saveSoldState();
        };
        row.appendChild(input);

        panel.appendChild(row);
      });
    }

    function findTeamByCode(code){
     const cfg = getCurrentConfig();
      if (!cfg) return null;

      for (const conf of cfg.conferences){
        const divs = cfg.divisions[conf] || {};
        for (const divName of Object.keys(divs)){
          const found = (divs[divName] || []).find(t => t.code === code);
          if (found) return found;
        }
      }
      return null;
    }

    const value  = document.getElementById('tickerSpeedValue');
    if (slider && value){
      slider.addEventListener('input', () => {
        value.textContent = `${parseInt(slider.value, 10)} px/s`;
      });
    }
  } else if (mode === 'title'){
    const t = loadTitles();
    title.textContent = 'Set Title';
    desc.textContent  = 'Format: MAIN TITLE || SUBTITLE';
    input.value = `${t.main} || ${t.sub}`;
    input.type = 'text';
  } else {
    title.textContent = 'Set Value';
    desc.textContent  = '';
    input.value = '';
    input.type = 'text';
  }

  modal.classList.remove('hidden');

  setTimeout(() => input.focus(), 0);
  input.onkeydown = (e) => {
    if (e.key === 'Enter') commitPrompt();
    if (e.key === 'Escape') closePrompt();
  };
}

    function closePrompt(){
      document.getElementById('obsPrompt')?.classList.add('hidden');
      PROMPT_MODE = null;
    }

function commitPrompt(){
  const input = document.getElementById('obsPromptInput');
  if (!input) return;

  const raw = String(input.value || '').trim();

  if (PROMPT_MODE === 'break'){
    const n = parseInt(raw, 10);
    if (Number.isFinite(n) && n > 0) setBreakNumber(n);
  }

if (PROMPT_MODE === 'ticker'){
  const slider = document.getElementById('tickerSpeedSlider');
  if (slider){
    saveTickerSpeed(parseInt(slider.value, 10));
  }
  applyTickerFromRaw(raw);
}

  if (PROMPT_MODE === 'title'){
    const parts = raw.split('||').map(s => s.trim());
    const main = parts[0] || DEFAULT_TITLE_MAIN;
    const sub  = parts[1] || DEFAULT_TITLE_SUB;
    applyTitles(main, sub);
  }

  closePrompt();
}

    /* =========================
       SSE Bridge (Whatnot Sale Bridge)
    ========================== */
    let sse = null;
    let sseScores = null;

    function getBridgeUrl() {
      const q = new URLSearchParams(location.search).get("bridge");
      if (q) {
        const cleaned = q.replace(/\/$/, "");
        localStorage.setItem(LS.BRIDGE, cleaned);
        return cleaned;
      }
      const saved = localStorage.getItem(LS.BRIDGE);
      return saved ? saved.replace(/\/$/, "") : "";
    }

    function getBridgeKey() {
      const q = new URLSearchParams(location.search).get("key");
      if (q) {
        localStorage.setItem(LS.KEY, q);
        return q;
      }
      return localStorage.getItem(LS.KEY) || "";
    }

  function getChannel(){
  return new URLSearchParams(location.search).get("channel") || "main";
}
function getScoresChannel(){
  return new URLSearchParams(location.search).get("scoresChannel") || "sports";
}
    function automationEnabled(){ return !!getBridgeUrl(); }

    function normalizeBridge(u){
      return String(u||'')
        .trim()
        .replace(/\/$/, '')
        .replace(/\/(events|stream)(\/.*)?$/,'');
    }

    function setSSEStatus(state, msg){
      const wrap = document.getElementById('sseStatus');
      const text = document.getElementById('sseText');
      if (!wrap || !text) return;

      wrap.classList.remove('connected','error');
      if (state === 'connected') wrap.classList.add('connected');
      if (state === 'error') wrap.classList.add('error');

      text.textContent = msg || state || 'disconnected';
    }

    function connectSSE(url){
      if (sse) { try { sse.close(); } catch(_){} }
      setSSEStatus('error','connecting');

      try{
        console.log("[overlay] EventSource URL:", url);

        sse = new EventSource(url);

        const ingest = (e) => {
          try{
            const data = JSON.parse(e.data);
            console.log("[SSE in]", data);
            handleSSEEvent(data);
          }catch(err){
            console.warn("[SSE parse error]", err, e.data);
          }
        };

        sse.onopen = () => {
          setSSEStatus('connected','connected');
          warmupPing();
        };

        sse.onmessage = ingest;

[
  'team_sold',
  'team_unsold',
  'buyer',
  'buyer_update',
  'sale',
  'purchase',
  'whatnot_purchase',
  'stream_stats',
  'scores',
  'reset',
  'set_break',
  'set_sport',
  'set_title'
].forEach(t => {
  try { sse.addEventListener(t, ingest); } catch(_){}
});

        sse.onerror = () => {
          setSSEStatus('error','reconnecting');
          try { sse.close(); } catch(_) {}
          sse = null;
          setTimeout(() => connectSSE(url), 2500);
        };
      }catch(_){
        setSSEStatus('error','failed');
      }
    }

function connectScoresSSE(base, scoresChannel = "sports"){
  if (sseScores) { try { sseScores.close(); } catch(_){} }

  try{
    const url = `${base}/stream?channel=${encodeURIComponent(scoresChannel)}`;
    sseScores = new EventSource(url);

    const ingest = (e) => {
      try{
        const data = JSON.parse(e.data);
        if (data?.type === "hello") return;
        if (String(data?.type || "").toLowerCase() === "scores") {
          handleSSEEvent(data);
        }
      }catch(_){}
    };

    sseScores.onmessage = ingest;
    try { sseScores.addEventListener("scores", ingest); } catch(_){}

    sseScores.onerror = () => {
      try { sseScores.close(); } catch(_) {}
      sseScores = null;
      setTimeout(() => connectScoresSSE(base, scoresChannel), 2500);
    };
  }catch(_){}
}

function startSSE(){
  if (!automationEnabled()){
    setSSEStatus('error','missing bridge');
    return;
  }

  const base = normalizeBridge(getBridgeUrl());
  const channel = getChannel();
  const scoresChannel = getScoresChannel();

  connectSSE(`${base}/stream?channel=${encodeURIComponent(channel)}`);

  if (scoresChannel) {
    connectScoresSSE(base, scoresChannel);
  }
}

    async function warmupPing(){
      if (!automationEnabled()) return;
      const base = normalizeBridge(getBridgeUrl());
      const key = getBridgeKey();

      try{
        await fetch(`${base}/events`, {
          method: 'POST',
        headers: {
  'Content-Type': 'application/json',
  ...(key ? {
    'x-bridge-key': key,
    'x-api-key': key
  } : {})
},
         body: JSON.stringify({
  type: 'overlay_warmup',
  overlay: 'lnl',
  channel: getChannel(),
  breakId: computeBreakId(),
  ts: Date.now()
})
        });
      }catch(_){}
    }

    function handleSSEEvent(data){
      const type = String(data?.type || '').toLowerCase();

      if (type === 'hello') return;

if (type === 'scores'){
  const sport = String(data?.sport || data?.league || '').toLowerCase().trim();
  const txt = normalizeScorePayloadToText(data);

  if (sport && txt){
    SCORES_BY_SPORT[sport] = txt;
    SCORES_UPDATED_AT[sport] = Date.now();
    requestTickerRefresh();
  }

  return;
}

      if (type === 'reset'){
        resetAll();
        return;
      }

      if (type === 'set_break'){
        const n = parseInt(data?.breakNumber, 10);
        if (Number.isFinite(n) && n > 0) setBreakNumber(n);
        return;
      }
if (type === 'team_unsold'){
  let code = String(data?.code || '').trim().toUpperCase();

  if (!code){
    const unsoldTitleRaw = String(data?.title || '');
    const unsoldTitle = stripPrefixTitle(unsoldTitleRaw);
    code = inferCodeFromTitle(unsoldTitle, String(data?.sport || currentBreakType || '').toLowerCase());
  }

  if (!code) return;

  if (soldTeams.has(code)){
    soldTeams.delete(code);
    const el = document.querySelector(`[data-team-code="${cssEscape(code)}"]`);
    if (el) el.classList.remove('sold');
  }

  const idx = soldTeamsList.findIndex(e => e.code === code);
  if (idx !== -1) soldTeamsList.splice(idx, 1);

  const listingKey = data?.saleId || data?.id || data?.listingId || null;
  if (listingKey){
    const cur = lastCodeByListingKey.get(listingKey);
    if (!cur || cur === code) lastCodeByListingKey.delete(listingKey);
  }

  updateStats();
  renderSoldPanel();
  saveSoldState();
  return;
}
if (type === 'team_sold'){
  const sport = String(data?.sport || '').toLowerCase();
  const buyer = String(data?.buyer || '').trim();

  const incomingTitleRaw = String(data?.title || '');
  const incomingTitle = stripPrefixTitle(incomingTitleRaw);

  if (sport && breakTypes[sport] && sport !== currentBreakType){
    currentBreakType = sport;
    loadSoldState();
    renderTeams();
  }

  let code = String(data?.code || '').trim().toUpperCase();

  if ((sport || currentBreakType) === 'nil'){
    code = inferCodeFromTitle(incomingTitle, 'nil');
    if (!code){
      console.warn("[overlay NIL] could not match title:", incomingTitleRaw, "=>", incomingTitle);
      return;
    }
  } else {
    if (!code) code = inferCodeFromTitle(stripPrefixTitle(incomingTitleRaw), sport || currentBreakType);
    if (!code){
      console.warn("[overlay] could not infer code from title:", incomingTitleRaw, "sportHint:", sport || currentBreakType);
      return;
    }
  }

  const listingKey = data?.saleId || data?.id || data?.listingId || null;

  if (listingKey && code){
    const prevCode = lastCodeByListingKey.get(listingKey);
    if (prevCode && prevCode !== code){
      soldTeams.delete(prevCode);
      const prevEl = document.querySelector(`[data-team-code="${cssEscape(prevCode)}"]`);
      if (prevEl) prevEl.classList.remove('sold');

      const prevIdx = soldTeamsList.findIndex(e => e.code === prevCode);
      if (prevIdx !== -1) soldTeamsList.splice(prevIdx, 1);
    }

    lastCodeByListingKey.set(listingKey, code);
  }

  if (!soldTeams.has(code)){
    soldTeams.add(code);
    const el = document.querySelector(`[data-team-code="${cssEscape(code)}"]`);
    if (el) el.classList.add('sold');
    soldTeamsList.push({ code, buyer: buyer || '' });
  } else if (buyer) {
    const idx = soldTeamsList.findIndex(e => e.code === code);
    if (idx !== -1) soldTeamsList[idx].buyer = buyer;
  }

  updateStats();
  renderSoldPanel();
  saveSoldState();
  return;
}

      if (type === 'buyer'){
        const code = String(data?.code || '').trim();
        const buyer = String(data?.buyer || '').trim();
        if (!code) return;

        const idx = soldTeamsList.findIndex(e => e.code === code);
        if (idx !== -1){
          soldTeamsList[idx].buyer = buyer;
          renderSoldPanel();
          saveSoldState();
        }
      }
    }

    /* =========================
       Helpers
    ========================== */
    function stripPrefixTitle(title){
      const raw = String(title || '').trim();
      if (!raw) return '';
      const parts = raw.split(' - ').map(s => s.trim()).filter(Boolean);
      return parts.length ? parts[parts.length - 1] : raw;
    }

    function norm(s){
      return String(s || '')
        .toLowerCase()
        .replace(/&/g,'and')
        .replace(/[^a-z0-9]+/g,' ')
        .trim();
    }

    function buildLookupForSport(sportKey){
      const cfg = breakTypes[sportKey];
      const map = new Map();

      if (!cfg) return map;

      for (const conf of cfg.conferences || []){
        const divs = cfg.divisions?.[conf] || {};
        for (const divName of Object.keys(divs)){
          for (const t of (divs[divName] || [])){
            const code = String(t.code || '').toUpperCase().trim();
            if (!code) continue;

            map.set(norm(code), code);
            if (t.name) map.set(norm(t.name), code);
            if (t.title) map.set(norm(t.title), code);
          }
        }
      }
      return map;
    }

    const SPORT_LOOKUP = { nfl: null, nba: null, mlb: null, wnba: null, nil: null };

    function ensureLookup(sportKey){
      if (!SPORT_LOOKUP[sportKey]) SPORT_LOOKUP[sportKey] = buildLookupForSport(sportKey);
      return SPORT_LOOKUP[sportKey];
    }

    function inferCodeFromTitle(title, sportHint){
      const t = norm(title);
      if (!t) return null;

      if (sportHint && breakTypes[sportHint]){
        const map = ensureLookup(sportHint);
        if (map.has(t)) return map.get(t);
        const keys = Array.from(map.keys()).sort((a,b) => b.length - a.length);
        for (const k of keys){
          if (k.length < 3) continue;
          if (t.includes(k)) return map.get(k);
        }
      }

      for (const sportKey of Object.keys(SPORT_LOOKUP)){
        if (!breakTypes[sportKey]) continue;
        const map = ensureLookup(sportKey);

        if (map.has(t)) return map.get(t);

        const keys = Array.from(map.keys()).sort((a,b) => b.length - a.length);
        for (const k of keys){
          if (k.length < 3) continue;
          if (t.includes(k)) return map.get(k);
        }
      }

      const tokens = t.toUpperCase().split(/\s+/).filter(Boolean);
      for (const tok of tokens){
        if (tok.length < 2 || tok.length > 4) continue;
        for (const sportKey of Object.keys(SPORT_LOOKUP)){
          const map = ensureLookup(sportKey);
          const code = map.get(norm(tok));
          if (code) return code;
        }
      }

      return null;
    }

    function cssEscape(s){
      return String(s || '').replace(/"/g,'\\"');
    }

    function fitTextToWidth(el, maxPx, minPx){
      if (!el) return;
      const parent = el.parentElement;
      if (!parent) return;

      const pad = 10;
      const maxWidth = parent.clientWidth - pad;

      let size = maxPx;
      el.style.fontSize = size + 'px';

      let loops = 0;
      while (loops++ < 40 && size > minPx && el.scrollWidth > maxWidth){
        size -= 1;
        el.style.fontSize = size + 'px';
      }
    }

    function refitAllNilTitles(){
      document.querySelectorAll('.team.nil .nil-title').forEach(el => {
        fitTextToWidth(el, 20, 10);
      });
    }

    /* =========================
       Init
    ========================== */
    document.addEventListener('DOMContentLoaded', () => {
     

      const t = loadTitles();
      applyTitles(t.main, t.sub);

      setTickerLines(loadTickerLines());
      setBreakNumber(loadBreakNumber());

      breakTypes.nil = buildNilBreakTypeFromEntries(loadNilEntries());

applyTickerMarquee();

      const qSport = String(new URLSearchParams(location.search).get('sport') || '').toLowerCase();
      if (qSport && breakTypes[qSport]) currentBreakType = qSport;

      applyTilePreset(currentBreakType);

      loadSoldState();
      initializeGrid();

      if (automationEnabled()) startSSE();
      else setSSEStatus('error','missing bridge');
    });
