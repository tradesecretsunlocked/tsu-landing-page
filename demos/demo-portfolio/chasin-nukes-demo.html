<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, initial-scale=1.0" />
   <title>[DEMO] Chasin' Nukes — Fire & Ice Multi-Sport Break Overlay</title>


  <style>
    :root{
      --W:1080px;
      --radius:18px;

      --bg0:#04070c;
      --bg1:#09121b;
      --bg2:#150a07;

      --ice1:#dff8ff;
      --ice2:#8ad7ff;
      --ice3:#1c8ecb;

      --fire1:#ffd89a;
      --fire2:#ff9e3d;
      --fire3:#ff5a1f;

      --white:#ffffff;
      --soft:#d9e8f0;
      --text:#ffffff;

      --line:rgba(255,255,255,0.14);
      --lineSoft:rgba(255,255,255,0.08);

      --team-cols:4;
      --team-height:64px;
      --teams-h:390px;

      --ticker-duration:20s;
            --fx-char-left:url('../../images/fx/char-edge-left.png.png');
      --fx-ice-right:url('../../images/fx/ice-crack-right-transparency.png');
      --fx-embers:url('../../images/fx/embers.png');
            --fx-icicle:url('../../images/fx/icicle-top.png');
      --fx-board:url('../../images/fx/fire-ice-bg.png');
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      padding:0;
      background:transparent;
      font-family: Arial, Helvetica, sans-serif;
      color:var(--text);
      user-select:none;
    }

    body{
      width:var(--W);
      min-height:720px;
    }

.overlay{
  width:var(--W);
  margin:0;
  border-radius:var(--radius);
  overflow:hidden;
  position:relative;
  padding:8px;
  background:
    radial-gradient(760px 380px at 12% 10%, rgba(255,88,20,0.42), transparent 56%),
    radial-gradient(780px 420px at 88% 12%, rgba(64,200,255,0.36), transparent 56%),
    radial-gradient(420px 220px at 50% 92%, rgba(255,160,54,0.08), transparent 62%),
    linear-gradient(90deg, #2a0c06 0%, #0a1018 50%, #061b29 100%);
  border:3px solid rgba(255,255,255,0.16);
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.7),
    0 18px 40px rgba(0,0,0,0.55),
    0 0 42px rgba(52,196,255,0.12),
    0 0 42px rgba(255,96,26,0.12);
  isolation:isolate;
}

    .main{
      position:relative;
      margin-top:8px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

.teams-section::before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(90deg,
      rgba(255,116,34,0.05) 0%,
      rgba(255,116,34,0.00) 35%,
      rgba(255,255,255,0.04) 50%,
      rgba(92,198,255,0.00) 65%,
      rgba(92,198,255,0.05) 100%);
}

    .main::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:0;
      background:
        var(--fx-embers) 19% 86% / 180px auto no-repeat,
        var(--fx-frost) right 22px top 18px / 210px auto no-repeat;
      opacity:.18;
      mix-blend-mode:screen;
    }



        .overlay > *{
      position:relative;
      z-index:1;
    }

    .main > *{
      position:relative;
      z-index:1;
    }

.header{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:8px 12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.16);
  background:
    linear-gradient(90deg,
      rgba(158,34,8,0.98) 0%,
      rgba(72,20,10,0.86) 22%,
      rgba(8,12,18,0.84) 50%,
      rgba(8,34,50,0.86) 78%,
      rgba(18,92,132,0.98) 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.10),
    inset 0 -1px 0 rgba(0,0,0,0.34);
  overflow:hidden;
}

.header::before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    var(--fx-char-left) left center / 110px 100% no-repeat,
    var(--fx-ice-right) right center / 110px 100% no-repeat,
    linear-gradient(90deg,
      rgba(255,122,42,0.14) 0%,
      rgba(255,122,42,0.00) 30%,
      rgba(255,255,255,0.04) 50%,
      rgba(84,196,255,0.00) 70%,
      rgba(84,196,255,0.14) 100%);
  opacity:.22;
  mix-blend-mode:screen;
}

.header::after{
  content:"";
  position:absolute;
  top:0;
  right:8px;
  width:140px;
  height:34px;
  pointer-events:none;
  background:var(--fx-icicle) top right / contain no-repeat;
  opacity:.14;
  mix-blend-mode:screen;
}

    .brand{
      display:flex;
      flex-direction:column;
      min-width:0;
      gap:1px;
    }

    .brand-title{
      font-size:28px;
      font-weight:900;
      line-height:1;
      letter-spacing:1.5px;
      text-transform:uppercase;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      color:#fff6e8;
      text-shadow:
        0 2px 0 rgba(0,0,0,0.8),
        0 0 16px rgba(255,132,50,0.18),
        0 0 16px rgba(84,188,255,0.18);
    }

    .brand-slogan{
      font-size:12px;
      font-weight:900;
      letter-spacing:1.6px;
      text-transform:uppercase;
      color:rgba(232,242,250,0.86);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .header-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex:0 0 auto;
    }

    .sport-chip{
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.14);
      background:rgba(0,0,0,0.34);
      font-size:13px;
      font-weight:900;
      letter-spacing:1px;
      text-transform:uppercase;
      color:#dff6ff;
      min-width:78px;
      text-align:center;
    }

    .break-box{
      display:flex;
      align-items:center;
      gap:10px;
      padding:8px 12px;
      border-radius:12px;
      background:rgba(0,0,0,0.38);
      border:1px solid rgba(255,255,255,0.14);
      box-shadow: inset 0 0 14px rgba(0,0,0,0.35);
    }

    .break-label{
      font-size:16px;
      font-weight:900;
      letter-spacing:1px;
      text-transform:uppercase;
      color:rgba(255,255,255,0.88);
    }

    .break-value{
      min-width:30px;
      text-align:right;
      font-size:24px;
      font-weight:900;
      color:#fff2d6;
      text-shadow:0 2px 0 rgba(0,0,0,0.8);
    }

    .main{
      position:relative;
      margin-top:8px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

   
.teams-section{
  position:relative;
  display:grid;
  grid-template-columns:1fr 146px 1fr;
  gap:8px;
  height:var(--teams-h);
  border-radius:16px;
  padding:6px;
  background:
    linear-gradient(90deg,
      rgba(112,24,8,0.90) 0%,
      rgba(34,12,8,0.62) 24%,
      rgba(6,10,16,0.50) 50%,
      rgba(8,24,36,0.62) 76%,
      rgba(12,78,118,0.90) 100%);
  border:1px solid rgba(255,255,255,0.12);
  overflow:visible;
}

.teams-section::before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    var(--fx-char-left) left center / 170px 100% no-repeat,
    var(--fx-ice-right) right center / 170px 100% no-repeat,
    var(--fx-board) center center / cover no-repeat,
    linear-gradient(90deg,
      rgba(255,116,34,0.08) 0%,
      rgba(255,116,34,0.00) 34%,
      rgba(255,255,255,0.05) 50%,
      rgba(92,198,255,0.00) 66%,
      rgba(92,198,255,0.08) 100%);
  opacity:1.22;
  mix-blend-mode:screen;
}

    .conference{
      position:relative;
      height:100%;
      min-height:0;
      overflow-y:auto;
      overflow-x:hidden;
      border-radius:14px;
      padding:4px;
      background:rgba(0,0,0,0.42);
      border:1px solid rgba(255,255,255,0.10);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }
    .conference::-webkit-scrollbar{ display:none; }

.conference.left{
  background:
    linear-gradient(180deg, rgba(255,96,22,0.20), rgba(0,0,0,0.62));
}

.conference.right{
  background:
    linear-gradient(180deg, rgba(70,208,255,0.20), rgba(0,0,0,0.62));
}

    .conference > *{
      position:relative;
      z-index:1;
    }

    .conference-title{
      text-align:center;
      font-size:15px;
      font-weight:900;
      letter-spacing:1px;
      text-transform:uppercase;
      padding:0px 0 2px;
      border-bottom:1px solid rgba(255,255,255,0.12);
      margin-bottom:1px;
      color:#eef7ff;
      
    }

    .division{
      margin-top:2px;
    }

    .division-name{
      font-size:12px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:1px;
      color:rgba(255,255,255,0.78);
      margin-bottom:4px;
      padding-left:2px;
    }

    .division-teams{
      display:grid;
      grid-template-columns:repeat(var(--team-cols), 1fr);
      gap:4px;
    }

    .team{
      position:relative;
      height:var(--team-height);
      border-radius:10px;
      overflow:hidden;
      cursor:pointer;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(0,0,0,0.60));
      border:2px solid rgba(255,255,255,0.84);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.06),
        0 6px 14px rgba(0,0,0,0.24);
      transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
      isolation:isolate;
    }

    .team:hover{
      transform:translateY(-2px);
      box-shadow:
        0 10px 20px rgba(0,0,0,0.38),
        0 0 16px rgba(255,255,255,0.08);
      border-color:#ffffff;
    }

     .team::before{
      content:"";
      position:absolute;
      inset:0;
      z-index:0;
      opacity:.16;
      pointer-events:none;
      background:
        linear-gradient(90deg,
          rgba(255,116,34,0.08) 0%,
          rgba(255,116,34,0.00) 38%,
          rgba(92,198,255,0.00) 62%,
          rgba(92,198,255,0.08) 100%);
    }

    @keyframes tilePulse{
      0%{ opacity:.22; transform:scale(.985); }
      50%{ opacity:.50; transform:scale(1.02); }
      100%{ opacity:.22; transform:scale(.985); }
    }

    .team img{
      position:relative;
      z-index:1;
      width:100%;
      height:100%;
      object-fit:cover;
      filter:drop-shadow(0 8px 12px rgba(0,0,0,0.45));
    }

    .fallback-code{
      position:absolute;
      inset:0;
      z-index:1;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
      font-weight:900;
      letter-spacing:1px;
      text-transform:uppercase;
      color:#fff;
      text-shadow:0 2px 10px rgba(0,0,0,0.75);
      padding:6px;
      text-align:center;
    }

    .team-label{
      position:absolute;
      inset:auto 0 0 0;
      z-index:2;
      padding:4px 4px 5px;
      text-align:center;
      font-size:11px;
      font-weight:900;
      letter-spacing:.7px;
      text-transform:uppercase;
      color:#ffffff;
      background:linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,0.76));
      text-shadow:0 2px 10px rgba(0,0,0,0.85);
      pointer-events:none;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .team.sold::before{
      opacity:.10;
      animation:none;
    }

    .team.sold img,
    .team.sold .fallback-code{
      opacity:.24;
      filter:grayscale(1) brightness(.45);
    }

    .team.sold .sold-x{
      opacity:1;
      transform:scale(1);
    }

    .sold-x{
      position:absolute;
      inset:0;
      z-index:3;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:48px;
      font-weight:900;
      color:#fff3df;
      text-shadow:
        0 0 10px rgba(255,101,28,0.65),
        0 0 16px rgba(65,190,255,0.55),
        0 8px 18px rgba(0,0,0,0.85);
      opacity:0;
      transform:scale(.92);
      transition:opacity .14s ease, transform .14s ease;
      pointer-events:none;
    }

    .team.flash{
      animation:soldFlash 280ms ease;
    }

    @keyframes soldFlash{
      0%{ box-shadow:0 0 0 rgba(255,132,40,0); }
      50%{ box-shadow:0 0 22px rgba(255,132,40,.65); }
      100%{ box-shadow:0 0 0 rgba(255,132,40,0); }
    }

.control-bar{
  position:relative;
  border-radius:14px;
  overflow:visible;;
  border:1px solid rgba(255,255,255,0.12);
  background:
    linear-gradient(180deg,
      rgba(255,118,40,0.24) 0%,
      rgba(0,0,0,0.66) 44%,
      rgba(92,198,255,0.24) 100%);
  box-shadow:
    inset 0 0 18px rgba(0,0,0,0.30),
    0 0 18px rgba(0,0,0,0.18);
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:stretch;
  padding:10px 7px;
  gap:18px;
}
     .brand-logo{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%, -50%);
      width:100%;
      pointer-events:none;
      z-index:1;
      display:flex;
      justify-content:center;
      align-items:center;
    }

  .brand-logo img{
  width:184px;
  max-width:none;
  height:auto;
  opacity:.98;
  position:relative;
  top: -190px;
  filter:
    drop-shadow(0 10px 18px rgba(0,0,0,0.72))
    drop-shadow(0 0 12px rgba(255,106,31,0.14))
    drop-shadow(0 0 12px rgba(77,197,255,0.14));
}

 .btn{
  position:relative;
  z-index:2;
  border:none;
  outline:none;
  cursor:pointer;
  border-radius:12px;
  padding:10px 8px;
  font-size:18px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.8px;
  color:#fff;
  border:2px solid rgba(255,255,255,0.16);
  background:
    linear-gradient(180deg, rgba(255,108,30,0.96), rgba(0,134,206,0.96));
  box-shadow:
    0 8px 16px rgba(0,0,0,0.28),
    inset 0 1px 0 rgba(255,255,255,0.10);
  transition:transform .12s ease, filter .12s ease;
}

    .btn:hover{ filter:brightness(1.06); }
    .btn:active{ transform:translateY(1px); }

.stat-box{
  position:relative;
  z-index:2;
  border-radius:12px;
  padding:7px 4px;
  text-align:center;
  background:
    linear-gradient(180deg, rgba(0,0,0,0.34), rgba(0,0,0,0.56));
  border:2px solid rgba(255,255,255,0.88);
  box-shadow:
    inset 0 0 14px rgba(0,0,0,0.26),
    0 0 12px rgba(255,255,255,0.04);
}

    .stat-box .value{
      font-size:24px;
      font-weight:900;
      color:#fff8ec;
      text-shadow:0 2px 0 rgba(0,0,0,0.8);
      line-height:1;
    }

    .stat-box .label{
      margin-top:3px;
      font-size:12px;
      font-weight:900;
      letter-spacing:1px;
      text-transform:uppercase;
      color:rgba(255,255,255,0.86);
    }

    .sold-stat{
      cursor:pointer;
    }

    .sold-stat::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
    }

.ticker{
  position:relative;
  height:42px;
  overflow:hidden;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.12);
  background:
    linear-gradient(90deg,
      rgba(150,28,8,0.70),
      rgba(0,0,0,0.72) 50%,
      rgba(16,88,128,0.70));
}


    .ticker-track{
      display:flex;
      width:max-content;
      animation:tickerMarquee var(--ticker-duration) linear infinite;
      will-change:transform;
    }

    .ticker-text{
      display:inline-block;
      line-height:42px;
      white-space:nowrap;
      padding-right:52px;
      font-size:18px;
      font-weight:900;
      letter-spacing:.9px;
      text-transform:uppercase;
      color:#f4fbff;
      text-shadow:0 2px 10px rgba(0,0,0,0.76);
    }

    @keyframes tickerMarquee{
      0%{ transform:translateX(0); }
      100%{ transform:translateX(-50%); }
    }



  .breaktype-buttons{
  display:flex;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
  min-width:0;
}



    .breaktype-btn,
    .pill-btn{
      border:none;
      outline:none;
      cursor:pointer;
      white-space:nowrap;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:1px;
      color:#eef8ff;
      border-radius:999px;
      border:2px solid rgba(255,255,255,0.14);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.10), rgba(0,0,0,0.30));
      box-shadow:0 8px 18px rgba(0,0,0,0.25);
      transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }

    .breaktype-btn{
      padding:8px 11px;
      font-size:16px;
    }

    .pill-btn{
      padding:9px 12px;
      font-size:14px;
    }

    .breaktype-btn:hover,
    .pill-btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 20px rgba(0,0,0,0.35);
    }

.breaktype-btn.active{
  border-color:rgba(255,164,92,0.78);
  box-shadow:
    0 0 0 2px rgba(81,193,255,0.10),
    0 10px 20px rgba(0,0,0,0.35);
  background:
    linear-gradient(90deg, rgba(255,94,26,0.34), rgba(0,136,210,0.34));
}

 .pill-btn.red{
  background:
    linear-gradient(180deg, rgba(255,94,26,0.88), rgba(0,136,210,0.88));
  color:#fff;
}

.sold-header-row{
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:10px;
  padding:8px 10px;
  border-radius:14px;
  background:
    linear-gradient(90deg,
      rgba(110,24,8,0.46),
      rgba(0,0,0,0.20) 50%,
      rgba(12,78,118,0.46));
  border:1px solid rgba(255,255,255,0.10);
}

    .sold-panel-title{
      font-size:13px;
      font-weight:900;
      letter-spacing:2px;
      text-transform:uppercase;
      color:#eef7ff;
    }

    .sold-controls-wrap{
      margin-top:8px;
      overflow:hidden;
      max-height:0;
      opacity:0;
      transform:translateY(-6px);
      transition:max-height .22s ease, opacity .18s ease, transform .18s ease, margin-top .18s ease;
    }

    .sold-controls-wrap.active{
      max-height:120px;
      opacity:1;
      transform:translateY(0);
    }

.sold-controls{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
  padding:10px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.10);
  background:
    linear-gradient(90deg,
      rgba(255,88,20,0.14),
      rgba(0,0,0,0.26),
      rgba(64,200,255,0.14));
}

    .sold-wrap{
      margin-top:8px;
      border-radius:14px;
      background:rgba(0,0,0,0.38);
      border:1px solid rgba(255,255,255,0.10);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
      padding:10px;
    }

.sold-wrap::before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:var(--fx-embers) 18px 14px / 110px auto no-repeat;
  opacity:.22;
  mix-blend-mode:screen;
}

    .sold-grid{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:10px;
    }

    .sold-item{
      display:flex;
      align-items:center;
      gap:8px;
      padding:7px 8px;
      border-radius:999px;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.06), rgba(0,0,0,0.30));
      border:1px solid rgba(255,255,255,0.10);
    }

    .sold-item img{
      width:44px;
      height:36px;
      object-fit:contain;
      border-radius:8px;
      background:rgba(0,0,0,0.25);
      padding:2px;
      flex:0 0 auto;
      filter:drop-shadow(0 10px 14px rgba(0,0,0,0.45));
    }

    .sold-item input{
      width:100%;
      border:none;
      outline:none;
      border-radius:999px;
      background:rgba(0,0,0,0.52);
      color:#fff;
      padding:10px 12px;
      font-size:14px;
      font-weight:900;
      border:1px solid rgba(255,255,255,0.10);
    }

    .sold-empty{
      padding:18px 12px;
      border-radius:12px;
      border:1px dashed rgba(255,255,255,0.12);
      background:rgba(0,0,0,0.22);
      text-align:center;
      font-size:14px;
      font-weight:900;
      letter-spacing:1px;
      text-transform:uppercase;
      color:rgba(255,255,255,0.68);
    }

        list: soldTeamsList.map(entry => ({ code: entry.code, buyer: entry.buyer || '' }))

      localStorage.setItem(soldStateKey(), JSON.stringify(payload));

      soldTeams.clear();
      soldTeamsList = [];

      try{
        const raw = localStorage.getItem(soldStateKey());
        if (!raw) return;
        const data = JSON.parse(raw);
        (Array.isArray(data?.sold) ? data.sold : []).forEach(code => soldTeams.add(String(code)));

        img.onerror = () => { img.remove(); };
        teamDiv.appendChild(img);
      }

      const fallback = document.createElement('div');
      fallback.className = 'fallback-code';
      fallback.textContent = teamObj.code || teamObj.name || '';
      teamDiv.appendChild(fallback);

      const label = document.createElement('div');
      label.className = 'team-label';
      label.textContent = teamObj.name || teamObj.code || '';
      teamDiv.appendChild(label);

      const soldX = document.createElement('div');
      soldX.className = 'sold-x';
      soldX.textContent = '✕';
      teamDiv.appendChild(soldX);

      teamDiv.onclick = () => toggleTeam(teamObj.code);
      return teamDiv;
    }

    function renderTeams(){
      updateHeader();

      const left = document.getElementById('conferenceLeft');
      const right = document.getElementById('conferenceRight');
      left.innerHTML = '';
      right.innerHTML = '';

      const cfg = breakTypes[currentBreakType];

      cfg.conferences.forEach((confName, index) => {
        const target = index === 0 ? left : right;

        const confTitle = document.createElement('div');
        confTitle.className = 'conference-title';
        confTitle.textContent = index === 0 ? cfg.leftTitle : cfg.rightTitle;
        target.appendChild(confTitle);

        const divisions = cfg.divisions[confName] || {};
        Object.keys(divisions).forEach(divName => {
          const divWrap = document.createElement('div');
          divWrap.className = 'division';

          const divTitle = document.createElement('div');
          divTitle.className = 'division-name';
          divTitle.textContent = divName;
          divWrap.appendChild(divTitle);

          const grid = document.createElement('div');
          grid.className = 'division-teams';

          divisions[divName].forEach(teamObj => {
            grid.appendChild(makeTeamDiv(teamObj));
          });

          divWrap.appendChild(grid);
          target.appendChild(divWrap);
        });
      });

      soldTeams.forEach(code => {
        const el = document.querySelector(`[data-team-code="${cssEscape(code)}"]`);
        if (el) el.classList.add('sold');
      });

      updateStats();
      renderSoldPanel();
    }

    function findTeamByCode(code){
      const cfg = breakTypes[currentBreakType];
      for (const conf of cfg.conferences){
        const divs = cfg.divisions[conf] || {};
        for (const divName of Object.keys(divs)){
          const found = (divs[divName] || []).find(team => team.code === code);
          if (found) return found;
        }
      }
      return null;
    }

    function toggleTeam(code){
      const teamDiv = document.querySelector(`[data-team-code="${cssEscape(code)}"]`);
      if (!teamDiv) return;

      const existingIndex = soldTeamsList.findIndex(entry => entry.code === code);

      if (soldTeams.has(code)){
        soldTeams.delete(code);
        teamDiv.classList.remove('sold');
        if (existingIndex !== -1) soldTeamsList.splice(existingIndex, 1);
      } else {
        soldTeams.add(code);
        teamDiv.classList.add('sold');
        teamDiv.classList.add('flash');
        setTimeout(() => teamDiv.classList.remove('flash'), 300);
        if (existingIndex === -1){
          soldTeamsList.push({ code, buyer:'' });
        }
      }

      updateStats();
      renderSoldPanel();
      saveSoldState();
    }

    function renderSoldPanel(){
      const panel = document.getElementById('soldPanel');
      panel.innerHTML = '';

      if (!soldTeamsList.length){
        const empty = document.createElement('div');
        empty.className = 'sold-empty';
        empty.style.gridColumn = '1 / -1';
        empty.textContent = 'No sold teams yet';
        panel.appendChild(empty);
        return;
      }

      soldTeamsList.forEach(entry => {
        const team = findTeamByCode(entry.code);

        const row = document.createElement('div');
        row.className = 'sold-item';

        const img = document.createElement('img');
        img.alt = entry.code;
        img.src = team?.image || '';
        img.onerror = () => { img.style.display = 'none'; };
        row.appendChild(img);

        const input = document.createElement('input');
        input.placeholder = `${entry.code} buyer`;
        input.value = entry.buyer || '';
        input.oninput = (e) => {
          entry.buyer = e.target.value;
          saveSoldState();
        };
        row.appendChild(input);

        panel.appendChild(row);
      });
    }

    function resetAll(){
      soldTeams.clear();
      soldTeamsList = [];
      document.querySelectorAll('.team').forEach(el => el.classList.remove('sold'));
      updateStats();
      renderSoldPanel();
      saveSoldState();
    }

    function setBreakType(type){
      if (!breakTypes[type]) return;
      currentBreakType = type;
      localStorage.setItem(LS.SPORT, type);
      loadSoldState();
      renderTeams();
    }

    /* =========================
       Sold controls toggle
    ========================== */
    function toggleSoldControls(force){
      soldControlsVisible = typeof force === 'boolean' ? force : !soldControlsVisible;
      localStorage.setItem(LS.SOLD_CONTROLS_OPEN, soldControlsVisible ? '1' : '0');
      document.getElementById('soldControlsWrap').classList.toggle('active', soldControlsVisible);
    }

    /* =========================
       Ticker
    ========================== */
    function buildTickerText(){
      return (tickerLines.length ? tickerLines : DEFAULT_TICKER_LINES).join('   •   ');
    }

    function setTickerTrackText(text){
      const a = document.getElementById('tickerTextA');
      const b = document.getElementById('tickerTextB');
      const track = document.getElementById('tickerTrack');

      const safe = ` ${String(text || '').trim() || ' '} `;
      a.textContent = safe;
      b.textContent = safe;

      const pxPerSec = loadTickerSpeed();
      track.style.animation = 'none';
      void track.offsetWidth;

      requestAnimationFrame(() => {
        const copyWidth = a.getBoundingClientRect().width || 1200;
        const duration = Math.max(8, copyWidth / Math.max(35, pxPerSec));
        document.getElementById('overlayRoot').style.setProperty('--ticker-duration', `${duration}s`);
        track.style.animation = '';
      });
    }

    function refreshTicker(){
      setTickerTrackText(buildTickerText());
    }

    function applyTickerFromRaw(raw){
      const txt = String(raw || '').trim();
      const parts = txt.includes('•')
        ? txt.split('•').map(v => v.trim()).filter(Boolean)
        : txt.split('|').map(v => v.trim()).filter(Boolean);

      tickerLines = parts.length ? parts : [txt || DEFAULT_TICKER_LINES.join(' • ')];
      saveTickerLines(tickerLines);
      refreshTicker();
    }

    /* =========================
       TSV export
    ========================== */
    function buildExportTSV(){
      const rows = [['Code', 'Team', 'Buyer', 'Sport', 'Break #', 'Title']];
      const title = loadTitles();

      soldTeamsList.forEach(entry => {
        const team = findTeamByCode(entry.code);
        rows.push([
          entry.code,
          team?.name || entry.code,
          entry.buyer || '',
          breakTypes[currentBreakType].name,
          currentBreakId(),
          `${title.main} ${title.sub}`.trim()
        ]);
      });

      return rows.map(cols => cols.join('\t')).join('\n');
    }

    async function copyExport(){
      const ta = document.getElementById('obsTextarea');
      try{
        await navigator.clipboard.writeText(ta.value);
      }catch(_){
        ta.focus();
        ta.select();
        document.execCommand('copy');
      }
    }

    /* =========================
       Modal
    ========================== */
    function openModal(mode){
      PROMPT_MODE = mode;

      const modal = document.getElementById('obsModal');
      const title = document.getElementById('obsModalTitle');
      const desc = document.getElementById('obsModalDesc');
      const input = document.getElementById('obsInput');
      const textarea = document.getElementById('obsTextarea');
      const speedWrap = document.getElementById('tickerSpeedWrap');
      const speedInput = document.getElementById('tickerSpeedInput');
      const copyBtn = document.getElementById('obsCopyBtn');
      const applyBtn = document.getElementById('obsApplyBtn');

      input.classList.add('hidden');
      textarea.classList.add('hidden');
      speedWrap.classList.add('hidden');
      copyBtn.classList.add('hidden');
      applyBtn.classList.remove('hidden');
      applyBtn.textContent = 'Apply';

      if (mode === 'break'){
        title.textContent = 'Set Break Number';
        desc.textContent = 'Enter a positive number.';
        input.type = 'text';
        input.value = currentBreakId();
        input.classList.remove('hidden');
      } else if (mode === 'title'){
        const t = loadTitles();
        title.textContent = 'Set Title';
        desc.textContent = 'Format: MAIN TITLE || SUBTITLE';
        input.type = 'text';
        input.value = `${t.main} || ${t.sub}`;
        input.classList.remove('hidden');
      } else if (mode === 'ticker'){
        title.textContent = 'Set Ticker';
        desc.textContent = 'Use • or | between items. Speed is below.';
        input.type = 'text';
        input.value = tickerLines.join(' • ');
        input.classList.remove('hidden');

        speedInput.value = String(loadTickerSpeed());
        updateTickerSpeedPill();
        speedWrap.classList.remove('hidden');
      } else if (mode === 'export'){
        title.textContent = 'Export Sold Teams (TSV)';
        desc.textContent = 'Tab-delimited export for Excel / Sheets.';
        textarea.value = buildExportTSV();
        textarea.classList.remove('hidden');
        copyBtn.classList.remove('hidden');
        applyBtn.classList.add('hidden');
      }

      modal.classList.add('show');

      requestAnimationFrame(() => {
        if (!input.classList.contains('hidden')) input.focus();
        if (!textarea.classList.contains('hidden')) textarea.focus();
      });
    }

    function closeModal(){
      document.getElementById('obsModal').classList.remove('show');
      PROMPT_MODE = null;
    }

    function updateTickerSpeedPill(){
      const v = parseInt(document.getElementById('tickerSpeedInput').value, 10) || DEFAULT_TICKER_SPEED;
      document.getElementById('tickerSpeedPill').textContent = `${v} px/sec`;
    }

    function commitModal(){
      const input = document.getElementById('obsInput');

      if (PROMPT_MODE === 'break'){
        applyBreakNumber(input.value);
        loadSoldState();
        renderTeams();
      } else if (PROMPT_MODE === 'title'){
        const raw = String(input.value || '').trim();
        const parts = raw.includes('||') ? raw.split('||') : [raw, DEFAULT_TITLE_SUB];
        applyTitles(parts[0], parts[1]);
      } else if (PROMPT_MODE === 'ticker'){
        applyTickerFromRaw(input.value);
        const speed = parseInt(document.getElementById('tickerSpeedInput').value, 10) || DEFAULT_TICKER_SPEED;
        saveTickerSpeed(speed);
        refreshTicker();
      }

      closeModal();
    }

    document.getElementById('tickerSpeedInput').addEventListener('input', updateTickerSpeedPill);

    document.getElementById('obsModal').addEventListener('click', (e) => {
      if (e.target.id === 'obsModal') closeModal();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
      if (e.key === 'Enter' && document.getElementById('obsModal').classList.contains('show') && PROMPT_MODE !== 'export'){
        const active = document.activeElement;
        if (active && active.tagName !== 'TEXTAREA'){
          e.preventDefault();
          commitModal();
        }
      }
    });

    /* =========================
       Init
    ========================== */
    function initializeGrid(){
      applyTitles(loadTitles().main, loadTitles().sub);
      applyBreakNumber(currentBreakId());
      tickerLines = loadTickerLines();
      loadSoldState();
      renderTeams();
      refreshTicker();
      toggleSoldControls(soldControlsVisible);
    }

    initializeGrid();

    /* Expose expected manual functions */
    window.initializeGrid = initializeGrid;
    window.toggleTeam = toggleTeam;
    window.updateStats = updateStats;
    window.updateSoldList = renderSoldPanel;
    window.resetAll = resetAll;
  </script>
</body>
</html>
